<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>In Type — Tom Milton</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#1a1410;
    --paper-2:#221a13;
    --ink:#f3e7d4;
    --warm:#e9b873;
    --muted:#b9a489;
    --fallback:#caa06a;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Fraunces", Georgia, serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* Grainy warm vignette overlay */
  .grain{
    position:fixed; inset:0; pointer-events:none; z-index:60;
    background:
      radial-gradient(140% 100% at 50% 0%, transparent 55%, rgba(0,0,0,.55) 100%),
      radial-gradient(120% 90% at 50% 120%, transparent 50%, rgba(0,0,0,.5) 100%);
    mix-blend-mode:multiply;
  }
  .grain::after{
    content:""; position:absolute; inset:-50%;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity:.05; mix-blend-mode:overlay;
    animation:grainShift 1.2s steps(4) infinite;
  }
  @keyframes grainShift{
    0%{transform:translate(0,0)}25%{transform:translate(-3%,2%)}
    50%{transform:translate(2%,-3%)}75%{transform:translate(-2%,-2%)}100%{transform:translate(0,0)}
  }

  /* Top chrome */
  .chrome{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; justify-content:space-between; align-items:center;
    padding:18px clamp(16px,4vw,40px);
    font-family:"Fraunces", serif; font-size:13px; letter-spacing:.04em;
    mix-blend-mode:difference; color:#fff;
  }
  .chrome a{ color:inherit; text-decoration:none; opacity:.85; transition:opacity .3s; }
  .chrome a:hover{ opacity:1; }
  .brand{ font-weight:500; letter-spacing:.22em; text-transform:uppercase; font-size:12px; }
  .back{ display:inline-flex; gap:.5em; align-items:center; }

  /* Progress dots */
  .nav-dots{
    position:fixed; right:clamp(12px,2vw,26px); top:50%; transform:translateY(-50%);
    z-index:50; display:flex; flex-direction:column; gap:13px;
  }
  @media (max-width:760px){ .nav-dots{ display:none; } }
  .nav-dots button{
    width:9px; height:9px; border-radius:50%; border:1px solid rgba(233,184,115,.55);
    background:transparent; cursor:pointer; padding:0; transition:all .35s ease;
  }
  .nav-dots button.on{ background:var(--warm); border-color:var(--warm); transform:scale(1.35); box-shadow:0 0 14px rgba(233,184,115,.6); }

  /* Scroll container */
  .reel{
    height:100vh; overflow-y:scroll; overflow-x:hidden;
    scroll-snap-type:y mandatory; scroll-behavior:smooth;
    perspective:1200px;
  }
  .reel::-webkit-scrollbar{ display:none; }
  .reel{ scrollbar-width:none; }

  .panel{
    position:relative; height:100vh; width:100%;
    scroll-snap-align:start; scroll-snap-stop:always;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    overflow:hidden;
  }
  /* subtle alternating bg tone */
  .panel:nth-child(even){ background:var(--paper-2); }

  /* faint ghost of the photo behind everything */
  .ghost{
    position:absolute; inset:0; z-index:0;
    background-size:cover; background-position:center;
    opacity:.06; filter:saturate(1.1) contrast(1.05);
    transition:opacity 1.2s ease;
  }
  .panel.active .ghost{ opacity:.13; }
  .panel.bw .ghost{ filter:grayscale(1) contrast(1.05); }

  .word-wrap{
    position:relative; z-index:2; width:100%;
    text-align:center; line-height:.82;
    padding:0 2vw;
  }

  .word{
    font-family:"Anton", Impact, sans-serif;
    font-weight:400;
    font-size:clamp(78px, 24vw, 360px);
    letter-spacing:-.01em;
    text-transform:uppercase;
    display:inline-block;
    /* image-in-text */
    background-image:var(--img);
    background-repeat:no-repeat;
    background-size:130% auto;
    background-position:50% 50%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    /* warm outline so the letters always read, whatever part of the photo fills them */
    -webkit-text-stroke:1.4px rgba(247,232,208,.42);
    /* depth + lift the image */
    filter:brightness(1.22) contrast(1.04) saturate(1.1) drop-shadow(0 0 2px rgba(255,238,214,.25)) drop-shadow(0 18px 40px rgba(0,0,0,.55));
    user-select:text;
  }
  .panel.bw .word{ -webkit-text-stroke:1.4px rgba(240,240,245,.45); filter:brightness(1.25) contrast(1.05) grayscale(1) drop-shadow(0 0 2px rgba(255,255,255,.22)) drop-shadow(0 18px 40px rgba(0,0,0,.6)); }

  /* fallback when background-clip:text unsupported */
  .no-clip .word{
    color:var(--fallback);
    -webkit-text-fill-color:var(--fallback);
    background:none;
    text-shadow:0 14px 40px rgba(0,0,0,.5);
  }

  /* letter entrance */
  .word .ltr{
    display:inline-block;
    transform:translateY(.62em) rotate(2deg);
    opacity:0;
    transition:transform .9s cubic-bezier(.16,1,.3,1), opacity .8s ease;
  }
  .panel.active .word .ltr{ transform:translateY(0) rotate(0); opacity:1; }
  /* outgoing */
  .panel.leaving .word .ltr{
    transform:translateY(-.42em) rotate(-2deg); opacity:0;
    transition:transform .5s ease, opacity .45s ease;
  }

  /* caption */
  .cap{
    position:relative; z-index:3; margin-top:clamp(18px,3.2vh,40px);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    opacity:0; transform:translateY(14px);
    transition:opacity .7s ease .25s, transform .7s ease .25s;
    text-align:center; padding:0 6vw;
  }
  .panel.active .cap{ opacity:1; transform:translateY(0); }
  .cap .ttl{
    font-style:italic; font-size:clamp(16px,2.4vw,26px); font-weight:400;
    color:var(--ink); letter-spacing:.01em;
  }
  .cap .meta{
    font-size:clamp(10px,1.3vw,12.5px); letter-spacing:.26em; text-transform:uppercase;
    color:var(--warm); font-weight:500;
    display:flex; flex-wrap:wrap; justify-content:center; gap:.4em 1em;
  }
  .cap .meta span{ position:relative; }
  .cap .meta span+span::before{
    content:"·"; position:absolute; left:-.85em; color:var(--muted); opacity:.6;
  }
  .cap .num{
    font-family:"Anton",sans-serif; font-size:11px; letter-spacing:.3em;
    color:var(--muted); opacity:.7; margin-top:4px;
  }

  /* HERO intro overlay text */
  .intro-tag{
    position:absolute; top:18%; left:50%; transform:translateX(-50%);
    z-index:3; text-align:center; pointer-events:none;
    font-size:clamp(10px,1.4vw,13px); letter-spacing:.42em; text-transform:uppercase;
    color:var(--warm); opacity:0;
    transition:opacity 1s ease 1.1s;
  }
  .panel.active .intro-tag{ opacity:.9; }

  /* scroll hint */
  .hint{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:40; display:flex; flex-direction:column; align-items:center; gap:8px;
    font-size:11px; letter-spacing:.36em; text-transform:uppercase; color:var(--muted);
    transition:opacity .6s ease;
  }
  .hint .arrow{
    width:1px; height:34px; background:linear-gradient(var(--warm),transparent);
    animation:hintMove 1.8s ease-in-out infinite;
  }
  @keyframes hintMove{ 0%,100%{ transform:scaleY(.6); opacity:.4 } 50%{ transform:scaleY(1); opacity:1 } }
  .hint.gone{ opacity:0; pointer-events:none; }

  /* closing card */
  .endcard{
    position:relative; z-index:2; text-align:center; padding:0 8vw;
  }
  .endcard .sig{
    font-family:"Anton",sans-serif; font-size:clamp(46px,11vw,150px);
    text-transform:uppercase; letter-spacing:-.01em; color:var(--warm);
    line-height:.9;
  }
  .endcard .blurb{
    margin-top:22px; font-style:italic; font-size:clamp(15px,2vw,21px);
    color:var(--muted); max-width:620px; margin-left:auto; margin-right:auto; line-height:1.5;
  }
  .endcard .links{ margin-top:30px; display:flex; gap:24px; justify-content:center; flex-wrap:wrap; }
  .endcard .links a{
    color:var(--ink); text-decoration:none; font-size:12px; letter-spacing:.2em;
    text-transform:uppercase; border-bottom:1px solid rgba(233,184,115,.4); padding-bottom:4px;
    transition:color .3s, border-color .3s;
  }
  .endcard .links a:hover{ color:var(--warm); border-color:var(--warm); }

  @media (prefers-reduced-motion: reduce){
    html, .reel{ scroll-behavior:auto; }
    .word .ltr{ transform:none !important; opacity:1 !important; transition:none; }
    .cap, .intro-tag{ opacity:1 !important; transform:none !important; transition:none; }
    .grain::after, .hint .arrow{ animation:none; }
  }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="chrome">
  <a class="back" href="../../index.html">&larr; All designs</a>
  <span class="brand">Tom Milton — In Type</span>
</header>

<nav class="nav-dots" aria-label="Section navigation"></nav>

<main class="reel" id="reel" tabindex="0" aria-label="Typographic photo reel">
  <!-- panels injected --></main>

<div class="hint" id="hint" aria-hidden="true">
  <span>scroll</span>
  <span class="arrow"></span>
</div>

<script>
(function(){
  "use strict";

  var REDUCE = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // feature test: background-clip text
  (function(){
    var t = document.createElement("span");
    var ok = ("webkitBackgroundClip" in t.style) || ("backgroundClip" in t.style);
    // quick functional probe
    t.style.cssText = "-webkit-background-clip:text;background-clip:text";
    if(!ok && !/text/.test(t.style.webkitBackgroundClip||"") && !/text/.test(t.style.backgroundClip||"")){
      document.documentElement.classList.add("no-clip");
    }
  })();

  var IMG = "../../assets/img/";
  var data = [
    {f:"golden-field-sunburst.jpg",     word:"LIGHT",  title:"Last Light, Wheat Country", loc:"Tuscany, Italy",      film:"Kodak Portra 400", cam:"Leica M6",        year:"1998", bw:false, dir:[ 0.12,-0.10]},
    {f:"sun-through-leaves.jpg",         word:"KYOTO",  title:"Backlit",                  loc:"Kyoto, Japan",       film:"Kodak Portra 800", cam:"Leica M6",        year:"2004", bw:false, dir:[-0.10, 0.08]},
    {f:"desert-dunes.jpg",               word:"WIND",   title:"Wind Lines",               loc:"Namibia",            film:"Kodak Ektar 100",  cam:"Hasselblad 503CW",year:"2008", bw:false, dir:[ 0.14, 0.06]},
    {f:"cliff-coast-ocean.jpg",          word:"EDGE",   title:"Edge of the World",        loc:"Big Sur, USA",       film:"Kodak Portra 400", cam:"Contax G2",       year:"2002", bw:false, dir:[-0.12,-0.07]},
    {f:"couple-silhouette-sunset.jpg",   word:"DUSK",   title:"Goodnight",                loc:"Santorini, Greece",  film:"Kodak Portra 800", cam:"Canon EOS-1V",    year:"2013", bw:false, dir:[ 0.08, 0.12]},
    {f:"forest-sunlight.jpg",            word:"PINES",  title:"Cathedral of Pines",       loc:"Olympic NP, USA",    film:"Kodak Portra 160", cam:"Hasselblad 500CM",year:"1996", bw:false, dir:[ 0.06,-0.12]},
    {f:"mountain-road-fog.jpg",          word:"ROAD",   title:"The Long Way Home",        loc:"Dolomites, Italy",   film:"Cinestill 800T",   cam:"Canon AE-1",      year:"2005", bw:false, dir:[-0.13, 0.05]},
    {f:"woman-fashion-portrait.jpg",     word:"RED",    title:"The Red Wall",             loc:"Marrakesh, Morocco", film:"Kodak Portra 400", cam:"Pentax 67",       year:"2019", bw:false, dir:[ 0.10, 0.10]},
    {f:"waterfall-bridge.jpg",           word:"FALLS",  title:"Hidden Falls",             loc:"Iceland",            film:"Fujifilm Velvia 50",cam:"Nikon FM2",      year:"2006", bw:false, dir:[ 0.05, 0.14]},
    {f:"street-cafe-paris.jpg",          word:"PARIS",  title:"Café de Flore",            loc:"Paris, France",      film:"Kodak Gold 200",   cam:"Olympus OM-1",    year:"2020", bw:false, dir:[-0.11,-0.09]},
    {f:"man-bw-portrait.jpg",            word:"SHADOW", title:"Portrait in Shadow",       loc:"Berlin, Germany",    film:"Ilford Delta 3200",cam:"Leica M6",        year:"2018", bw:true,  dir:[ 0.09,-0.08]}
  ];

  var reel = document.getElementById("reel");
  var dotsNav = document.querySelector(".nav-dots");
  var panels = [];

  function makeWord(word, el){
    el.innerHTML = "";
    for(var i=0;i<word.length;i++){
      var s = document.createElement("span");
      s.className = "ltr";
      s.textContent = word[i];
      s.style.transitionDelay = (0.05 + i*0.06) + "s";
      el.appendChild(s);
    }
  }

  data.forEach(function(d, idx){
    var p = document.createElement("section");
    p.className = "panel" + (d.bw ? " bw" : "");
    p.setAttribute("aria-roledescription","slide");
    p.setAttribute("aria-label", (idx+1)+" of "+data.length+": "+d.title);
    var url = "url('"+IMG+d.f+"')";
    p.style.setProperty("--img", url);
    p.dataset.idx = idx;
    p.dataset.dx = d.dir[0];
    p.dataset.dy = d.dir[1];

    var ghost = document.createElement("div");
    ghost.className = "ghost";
    ghost.style.backgroundImage = url;
    ghost.setAttribute("aria-hidden","true");
    p.appendChild(ghost);

    if(idx===0){
      var tag = document.createElement("div");
      tag.className = "intro-tag";
      tag.textContent = "A film portfolio, set in type";
      p.appendChild(tag);
    }

    var wrap = document.createElement("div");
    wrap.className = "word-wrap";
    var h = document.createElement("h2");
    h.className = "word";
    h.setAttribute("aria-label", d.word);
    makeWord(d.word, h);
    wrap.appendChild(h);
    p.appendChild(wrap);

    var cap = document.createElement("figcaption");
    cap.className = "cap";
    cap.innerHTML =
      '<div class="ttl">'+d.title+'</div>'+
      '<div class="meta">'+
        '<span>'+d.loc+'</span>'+
        '<span>'+d.film+'</span>'+
        '<span>'+d.cam+'</span>'+
        '<span>'+d.year+'</span>'+
      '</div>'+
      '<div class="num">'+("0"+(idx+1)).slice(-2)+' / '+("0"+data.length).slice(-2)+'</div>';
    p.appendChild(cap);

    reel.appendChild(p);
    panels.push(p);

    var btn = document.createElement("button");
    btn.type="button";
    btn.setAttribute("aria-label","Go to "+d.word);
    btn.addEventListener("click", function(){
      panels[idx].scrollIntoView({behavior: REDUCE ? "auto":"smooth"});
    });
    dotsNav.appendChild(btn);
  });

  // closing panel
  var end = document.createElement("section");
  end.className = "panel";
  end.setAttribute("aria-label","Colophon");
  end.innerHTML =
    '<div class="endcard">'+
      '<div class="sig">Tom&nbsp;Milton</div>'+
      '<p class="blurb">Thirty years on film — from the wheat fields of Tuscany to a shadowed room in Berlin. Each frame set, here, inside the word it became.</p>'+
      '<div class="links">'+
        '<a href="../../index.html">&larr; All designs</a>'+
        '<a href="mailto:tom.milton@amododesign.com">Contact</a>'+
      '</div>'+
    '</div>';
  reel.appendChild(end);
  panels.push(end);
  var endBtn = document.createElement("button");
  endBtn.type="button"; endBtn.setAttribute("aria-label","Go to colophon");
  endBtn.addEventListener("click", function(){ end.scrollIntoView({behavior: REDUCE?"auto":"smooth"}); });
  dotsNav.appendChild(endBtn);

  var dots = Array.prototype.slice.call(dotsNav.children);

  // ---- activation via IntersectionObserver ----
  var activeIdx = 0;
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      var p = e.target;
      if(e.isIntersecting && e.intersectionRatio > 0.55){
        if(!p.classList.contains("active")){
          p.classList.remove("leaving");
          p.classList.add("active");
        }
        var i = panels.indexOf(p);
        if(i !== activeIdx){
          activeIdx = i;
          dots.forEach(function(d,di){ d.classList.toggle("on", di===i); });
        }
      } else {
        if(p.classList.contains("active") && e.intersectionRatio < 0.25){
          p.classList.remove("active");
          p.classList.add("leaving");
        }
      }
    });
  }, { root: reel, threshold:[0,0.25,0.55,0.8] });

  panels.forEach(function(p){ io.observe(p); });

  // kick first panel active immediately for strong initial state
  requestAnimationFrame(function(){
    panels[0].classList.add("active");
    dots[0].classList.add("on");
  });

  // ---- hint hide on first scroll ----
  var hint = document.getElementById("hint");
  var hidHint = false;
  function hideHint(){ if(!hidHint){ hidHint=true; hint.classList.add("gone"); } }
  reel.addEventListener("scroll", hideHint, {passive:true});
  setTimeout(function(){ if(!hidHint) hint.classList.add("gone"); }, 7000);

  // ---- pointer parallax target ----
  var pmx = 0, pmy = 0; // -1..1
  if(!REDUCE){
    window.addEventListener("pointermove", function(ev){
      pmx = (ev.clientX / window.innerWidth - 0.5) * 2;
      pmy = (ev.clientY / window.innerHeight - 0.5) * 2;
    }, {passive:true});
    // touch drift
    window.addEventListener("touchmove", function(ev){
      if(ev.touches && ev.touches[0]){
        pmx = (ev.touches[0].clientX / window.innerWidth - 0.5) * 2;
        pmy = (ev.touches[0].clientY / window.innerHeight - 0.5) * 2;
      }
    }, {passive:true});
  }

  // ---- Ken Burns + parallax driver (only active panel) ----
  var cmx = 0, cmy = 0; // smoothed pointer
  var t0 = performance.now();

  function render(now){
    var t = (now - t0) / 1000;
    // ease pointer
    cmx += (pmx - cmx) * 0.06;
    cmy += (pmy - cmy) * 0.06;

    var p = panels[activeIdx];
    if(p){
      var word = p.querySelector(".word");
      if(word){
        var dx = parseFloat(p.dataset.dx)||0;
        var dy = parseFloat(p.dataset.dy)||0;
        // ken burns: slow zoom oscillation + drift
        var zoom = 128 + Math.sin(t*0.18 + activeIdx) * 9;      // bg-size %
        var driftX = 50 + Math.sin(t*0.13 + activeIdx) * 9 * (dx*8);
        var driftY = 50 + Math.cos(t*0.11 + activeIdx) * 9 * (dy*8);
        // pointer parallax
        var px = driftX + cmx * 7;
        var py = driftY + cmy * 7;
        if(px<8)px=8; if(px>92)px=92; if(py<8)py=8; if(py>92)py=92;
        word.style.backgroundSize = zoom.toFixed(2) + "% auto";
        word.style.backgroundPosition = px.toFixed(2) + "% " + py.toFixed(2) + "%";
      }
    }
    requestAnimationFrame(render);
  }

  if(REDUCE){
    // static, centered, legible — no motion
    panels.forEach(function(p){
      var w = p.querySelector(".word");
      if(w){ w.style.backgroundSize="130% auto"; w.style.backgroundPosition="50% 50%"; }
    });
  } else {
    requestAnimationFrame(render);
  }

  // ---- keyboard nav ----
  window.addEventListener("keydown", function(e){
    if(e.key==="ArrowDown"||e.key==="PageDown"){
      if(activeIdx < panels.length-1){ e.preventDefault(); panels[activeIdx+1].scrollIntoView({behavior:REDUCE?"auto":"smooth"}); }
    } else if(e.key==="ArrowUp"||e.key==="PageUp"){
      if(activeIdx > 0){ e.preventDefault(); panels[activeIdx-1].scrollIntoView({behavior:REDUCE?"auto":"smooth"}); }
    }
  });

})();
</script>
</body>
</html>
