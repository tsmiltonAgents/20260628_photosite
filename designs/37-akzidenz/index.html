<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akzidenz — Tom Milton, Photographs</title>
<meta name="description" content="Bold reductive Swiss type: place names and years at full scale, with Tom Milton's film photographs as supporting evidence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Archivo+Expanded:wght@700;800;900&display=swap" rel="stylesheet">
<script>document.documentElement.className="js";</script>
<style>
  :root{
    --bg:#ffffff;
    --ink:#0c0c0c;
    --ink-50:#6f6f6f;
    --red:#e1140a;
    --pad:clamp(16px,4vw,56px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Archivo','Helvetica Neue',Arial,sans-serif;
    font-size:16px;line-height:1.4;-webkit-font-smoothing:antialiased;
    font-feature-settings:"tnum" 1;
  }
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}

  /* ===== fixed running header ===== */
  .runhead{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:13px var(--pad);
    mix-blend-mode:difference;color:#fff;
    pointer-events:none;
  }
  .runhead a{pointer-events:auto}
  .runhead .l,.runhead .r,.runhead .c{
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;
    font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  .runhead .c{display:flex;align-items:center;gap:.8em}
  .runhead .c .bar{position:relative;width:64px;height:2px;background:rgba(255,255,255,.35)}
  .runhead .c .bar i{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--red);transition:width .25s ease}
  .runhead .back{display:inline-flex;gap:.5em;align-items:center;transition:opacity .18s}
  .runhead .back:hover{opacity:.6}

  /* ===== deck ===== */
  .deck{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth}
  .sec{height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;
    position:relative;display:flex;align-items:center;padding:clamp(70px,10vh,120px) var(--pad) clamp(40px,7vh,80px);
    overflow:hidden}
  .sec.alt{background:var(--ink);color:var(--bg)}
  .sec.alt .meta-line{border-color:rgba(255,255,255,.25)}
  .sec.alt .num{color:var(--red)}

  .stage{width:100%;max-width:1640px;margin:0 auto;
    display:grid;grid-template-columns:1fr minmax(0,38%);gap:clamp(20px,4vw,64px);align-items:center}
  .sec.right .stage{grid-template-columns:minmax(0,38%) 1fr}
  .sec.right .typeblock{order:2}.sec.right .photoblock{order:1}

  /* type block */
  .typeblock{min-width:0;position:relative}
  .num{font-family:'Archivo Expanded',sans-serif;font-weight:800;
    font-size:clamp(13px,1vw,15px);letter-spacing:.04em;color:var(--red);
    font-variant-numeric:tabular-nums;margin-bottom:clamp(8px,1.4vh,18px)}
  .num span{color:var(--ink-50)}
  .sec.alt .num span{color:rgba(255,255,255,.5)}

  .place{font-family:'Archivo Expanded',sans-serif;font-weight:900;
    text-transform:uppercase;line-height:.82;letter-spacing:-.025em;
    font-size:clamp(46px,11vw,168px)}
  .place .line{display:block;overflow:hidden}
  .place .ml{display:block;will-change:transform}
  html.js .sec:not(.active) .place .ml{transform:translateY(112%)}
  html.js .sec.active .place .ml{transform:translateY(0);
    transition:transform .9s cubic-bezier(.16,1,.3,1);transition-delay:var(--d,0s)}

  .yr{font-family:'Archivo Expanded',sans-serif;font-weight:800;
    font-size:clamp(20px,3.6vw,56px);letter-spacing:-.02em;line-height:1;
    margin-top:clamp(10px,2vh,26px);display:inline-flex;align-items:baseline;gap:.4em}
  .yr .dash{color:var(--red)}
  html.js .sec:not(.active) .yr,html.js .sec:not(.active) .ttl,html.js .sec:not(.active) .meta-line{
    opacity:0;transform:translateY(14px)}
  html.js .sec.active .yr,html.js .sec.active .ttl,html.js .sec.active .meta-line{
    opacity:1;transform:none;transition:opacity .7s ease .35s,transform .7s cubic-bezier(.16,1,.3,1) .35s}

  .ttl{margin-top:clamp(10px,1.6vh,18px);font-size:clamp(15px,1.5vw,22px);font-weight:700;letter-spacing:-.01em}
  .meta-line{margin-top:clamp(10px,1.6vh,16px);padding-top:9px;border-top:1.5px solid var(--ink);
    display:flex;flex-wrap:wrap;gap:0;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-50);font-variant-numeric:tabular-nums;max-width:64ch}
  .sec.alt .meta-line{color:rgba(255,255,255,.7)}
  .meta-line span{position:relative;padding:0 10px}
  .meta-line span:first-child{padding-left:0}
  .meta-line span:not(:last-child)::after{content:"/";position:absolute;right:1px;top:0;color:var(--red)}

  /* photo block */
  .photoblock{min-width:0}
  .frame{position:relative;overflow:hidden;background:#e9e9e9;width:100%;aspect-ratio:4/5}
  .sec.wide .frame{aspect-ratio:3/2}
  .frame img{width:100%;height:100%;object-fit:cover;
    filter:sepia(.10) saturate(1.04) contrast(.98) brightness(1.03);
    transform:scale(1.08)}
  .frame img.bw{filter:grayscale(1) contrast(1.05) brightness(1.0)}
  html.js .sec:not(.active) .frame{clip-path:inset(0 0 0 100%)}
  html.js .sec.active .frame{clip-path:inset(0 0 0 0);transition:clip-path .95s cubic-bezier(.16,1,.3,1) .12s}
  html.js .sec.active .frame img{transform:scale(1);transition:transform 1.3s cubic-bezier(.16,1,.3,1) .12s}
  .frame .fnum{position:absolute;left:0;bottom:0;background:var(--red);color:#fff;
    font-size:10px;font-weight:700;letter-spacing:.14em;padding:5px 9px;font-variant-numeric:tabular-nums}

  /* intro / outro */
  .intro .stage,.outro .stage{grid-template-columns:1fr;text-align:left}
  .intro .lead{font-family:'Archivo Expanded',sans-serif;font-weight:900;text-transform:uppercase;
    line-height:.84;letter-spacing:-.03em;font-size:clamp(44px,11vw,170px)}
  .intro .lead em{font-style:normal;color:var(--red)}
  .intro .subl{margin-top:clamp(16px,3vh,34px);max-width:52ch;font-size:clamp(13px,1.4vw,17px);
    color:var(--ink-50);line-height:1.5}
  .intro .scrollcue{margin-top:clamp(22px,4vh,48px);font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink);display:inline-flex;align-items:center;gap:.7em}
  .intro .scrollcue .arr{display:inline-block;animation:bob 1.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  .outro{background:var(--ink);color:var(--bg)}
  .outro .lead{font-family:'Archivo Expanded',sans-serif;font-weight:900;text-transform:uppercase;
    line-height:.84;letter-spacing:-.03em;font-size:clamp(40px,9vw,150px)}
  .outro .lead em{font-style:normal;color:var(--red)}
  .outro .cz{margin-top:clamp(18px,3vh,36px);display:flex;flex-wrap:wrap;gap:10px 26px;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.65);
    font-variant-numeric:tabular-nums}

  @media (max-width:820px){
    .stage,.sec.right .stage{grid-template-columns:1fr;gap:18px;align-content:center}
    .sec.right .typeblock{order:1}.sec.right .photoblock{order:2}
    .frame,.sec.wide .frame{aspect-ratio:3/2;max-height:34dvh}
    .frame{margin:0 auto}
    .sec{align-items:flex-start;padding-top:clamp(64px,10vh,90px)}
    .place{font-size:clamp(40px,14vw,80px)}
  }
  @media (prefers-reduced-motion:reduce){
    .deck{scroll-behavior:auto}
    html.js .sec .place .ml{transform:none!important}
    html.js .sec .yr,html.js .sec .ttl,html.js .sec .meta-line{opacity:1!important;transform:none!important}
    html.js .sec .frame{clip-path:none!important}
    html.js .sec .frame img{transform:none!important}
    .intro .scrollcue .arr{animation:none}
  }
</style>
</head>
<body>

<header class="runhead">
  <a class="l back" href="../../index.html"><span aria-hidden="true">&larr;</span> All designs</a>
  <span class="c"><span id="counter">00 / 14</span><span class="bar"><i id="prog"></i></span></span>
  <span class="r">Tom Milton — Akzidenz</span>
</header>

<main class="deck" id="deck" tabindex="-1"></main>

<script>
(function(){
  "use strict";
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  var works = [
    {place:['BIG','SUR'], t:'Edge of the World', loc:'United States', film:'Kodak Portra 400', cam:'Contax G2', yr:'2002', f:'cliff-coast-ocean.jpg'},
    {place:['NAMIB'],      t:'Wind Lines',        loc:'Namibia',       film:'Kodak Ektar 100',  cam:'Hasselblad 503CW', yr:'2008', f:'desert-dunes.jpg', wide:true},
    {place:['BANFF'],      t:'The Cabin at Dawn', loc:'Canada',        film:'Kodak Ektar 100',  cam:'Mamiya 7 II', yr:'2003', f:'lake-cabin-dawn.jpg'},
    {place:['NORWAY'],     t:'Silence',           loc:'Norway',        film:'Ilford HP5 Plus',  cam:'Leica M6', yr:'2003', f:'misty-pine-forest.jpg', bw:true, wide:true},
    {place:['MARRA','KESH'],t:'The Red Wall',     loc:'Morocco',       film:'Kodak Portra 400', cam:'Pentax 67', yr:'2019', f:'woman-fashion-portrait.jpg'},
    {place:['BERLIN'],     t:'Portrait in Shadow',loc:'Germany',       film:'Ilford Delta 3200',cam:'Leica M6', yr:'2018', f:'man-bw-portrait.jpg', bw:true},
    {place:['HALL','STATT'],t:'Reflections',      loc:'Austria',       film:'Kodak Ektar 100',  cam:'Mamiya RZ67', yr:'2000', f:'lake-mountain-house.jpg', wide:true},
    {place:['PARIS'],      t:'Café de Flore',     loc:'France',        film:'Kodak Gold 200',   cam:'Olympus OM-1', yr:'2020', f:'street-cafe-paris.jpg', wide:true},
    {place:['HAVANA'],     t:'Sunday Drive',      loc:'Cuba',          film:'Kodak Ektar 100',  cam:'Nikon FE', yr:'2022', f:'vintage-car-street.jpg', wide:true},
    {place:['TUS','CANY'], t:'Last Light',        loc:'Italy',         film:'Kodak Portra 400', cam:'Leica M6', yr:'1998', f:'golden-field-sunburst.jpg', wide:true}
  ];

  function esc(s){return String(s).replace(/&/g,'&amp;');}
  var deck = document.getElementById('deck');
  var html = '';

  /* intro */
  html += '<section class="sec intro active" data-kind="intro">'+
    '<div class="stage"><div class="typeblock">'+
      '<div class="lead">Place,<br>Year,<br><em>Frame.</em></div>'+
      '<p class="subl">Fourteen years on film, reduced to their essentials — a place name, a date, and the photograph offered as evidence. Scroll.</p>'+
      '<span class="scrollcue">Scroll to begin <span class="arr" aria-hidden="true">&darr;</span></span>'+
    '</div></div></section>';

  for(var i=0;i<works.length;i++){
    var w = works[i];
    var n = (i+1<10?'0':'')+(i+1);
    var alt = (i%2===1)?' alt':'';
    var right = (i%2===1)?' right':'';
    var wide = w.wide?' wide':'';
    var placeHtml = '';
    for(var p=0;p<w.place.length;p++){
      placeHtml += '<span class="line"><span class="ml" style="--d:'+(0.06*p)+'s">'+w.place[p]+'</span></span>';
    }
    html += '<section class="sec'+alt+right+wide+'" data-kind="work" data-n="'+n+'">'+
      '<div class="stage">'+
        '<div class="typeblock">'+
          '<div class="num">No. '+n+' <span>/ of 10</span></div>'+
          '<h2 class="place">'+placeHtml+'</h2>'+
          '<div class="yr"><span class="dash">—</span> '+w.yr+'</div>'+
          '<div class="ttl">'+esc(w.t)+'</div>'+
          '<div class="meta-line"><span>'+esc(w.loc)+'</span><span>'+esc(w.film)+'</span><span>'+esc(w.cam)+'</span></div>'+
        '</div>'+
        '<figure class="photoblock"><div class="frame">'+
          '<img src="../../assets/img/'+w.f+'" alt="'+esc(w.t)+', '+esc(w.loc)+'"'+(w.bw?' class="bw"':'')+' loading="'+(i<2?'eager':'lazy')+'">'+
          '<figcaption class="fnum">FIG. '+n+'</figcaption>'+
        '</div></figure>'+
      '</div></section>';
  }

  /* outro */
  html += '<section class="sec outro" data-kind="outro">'+
    '<div class="stage"><div class="typeblock">'+
      '<div class="lead">Tom<br><em>Milton</em></div>'+
      '<div class="cz">'+
        '<span>Photographs 1995—2023</span><span>Film, 35 & 120</span>'+
        '<span>Type / Archivo Grotesque</span><span>Red / #E1140A</span><span>Cat. No. 37</span>'+
      '</div>'+
    '</div></div></section>';

  deck.innerHTML = html;

  var secs = Array.prototype.slice.call(deck.querySelectorAll('.sec'));
  var counter = document.getElementById('counter');
  var prog = document.getElementById('prog');
  var total = secs.length;

  function setActive(sec){
    secs.forEach(function(s){ if(s!==sec) s.classList.remove('active'); });
    sec.classList.add('active');
    var idx = secs.indexOf(sec);
    var label;
    if(sec.getAttribute('data-kind')==='work'){ label = sec.getAttribute('data-n')+' / 10'; }
    else if(sec.getAttribute('data-kind')==='intro'){ label='00 / 10'; }
    else { label='10 / 10'; }
    counter.textContent = label;
    prog.style.width = ((idx)/(total-1)*100).toFixed(1)+'%';
  }
  setActive(secs[0]);

  if(!reduce && 'IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      var best=null, bestR=0;
      entries.forEach(function(e){ if(e.intersectionRatio>bestR){bestR=e.intersectionRatio;best=e.target;} });
      if(best && bestR>0.5) setActive(best);
    },{root:deck,threshold:[0.25,0.5,0.75,0.9]});
    secs.forEach(function(s){io.observe(s);});
  } else {
    /* reduced motion: everything active/visible */
    secs.forEach(function(s){s.classList.add('active');});
  }

  /* keyboard paging */
  deck.addEventListener('keydown',function(ev){
    if(ev.key==='ArrowDown'||ev.key==='PageDown'||ev.key==='ArrowUp'||ev.key==='PageUp'){
      var cur = secs.find(function(s){return s.classList.contains('active');}) || secs[0];
      var idx = secs.indexOf(cur);
      var dir = (ev.key==='ArrowDown'||ev.key==='PageDown')?1:-1;
      var nxt = secs[Math.max(0,Math.min(secs.length-1,idx+dir))];
      if(nxt){ ev.preventDefault(); nxt.scrollIntoView({behavior:reduce?'auto':'smooth'}); }
    }
  });
})();
</script>
</body>
</html>
