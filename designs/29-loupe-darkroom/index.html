<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tom Milton — The Loupe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0908;
    --table:#14110d;
    --amber:#e8b765;
    --warm:#d9a066;
    --paper:#1c1813;
    --ink:#e9ddc8;
    --dim:#6b5f4d;
    --loupe-size:300px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    overflow:hidden;
    cursor:none;
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  /* ---------- Light table backdrop ---------- */
  .room{
    position:fixed;inset:0;
    background:
      radial-gradient(120% 90% at 50% 8%, #1a160f 0%, #0b0a08 55%, #060504 100%);
  }
  .vignette{
    position:fixed;inset:0;pointer-events:none;z-index:40;
    box-shadow:inset 0 0 320px 120px rgba(0,0,0,.92);
    background:radial-gradient(110% 80% at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
  }
  /* ---------- Top chrome ---------- */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:60;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:20px 26px;pointer-events:none;
    mix-blend-mode:screen;
  }
  .topbar a,.topbar .meta{pointer-events:auto}
  .backlink{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--dim);text-decoration:none;cursor:none;
    transition:color .3s;
  }
  .backlink:hover{color:var(--amber)}
  .brand{text-align:right}
  .brand h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;font-size:21px;letter-spacing:.16em;
    color:var(--ink);line-height:1;
  }
  .brand .sub{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--dim);margin-top:6px;
  }
  /* ---------- Contact sheet ---------- */
  .sheet-wrap{
    position:fixed;inset:0;z-index:10;
    display:flex;align-items:center;justify-content:center;
    padding:72px 26px 54px;
  }
  .sheet{
    --cols:5;
    display:grid;
    grid-template-columns:repeat(var(--cols),1fr);
    gap:10px;
    width:min(94vw,1080px);
    padding:18px;
    background:
      linear-gradient(180deg,#100d09,#0c0a07);
    border:1px solid #221c14;
    border-radius:3px;
    box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 1px rgba(232,183,101,.04);
  }
  .frame{
    position:relative;
    aspect-ratio:3/2;
    overflow:hidden;
    background:#000;
    border:1px solid #1a1510;
    cursor:none;
  }
  .frame img{
    width:100%;height:100%;object-fit:cover;display:block;
    /* dim, low-key, desaturated — the dark room */
    filter:brightness(.34) saturate(.45) contrast(1.05);
    transition:filter .5s ease;
  }
  .frame.bw img{filter:brightness(.34) saturate(0) contrast(1.1)}
  .frame .idx{
    position:absolute;top:3px;left:4px;
    font-family:'JetBrains Mono',monospace;
    font-size:8px;color:rgba(232,183,101,.4);
    letter-spacing:.05em;z-index:2;
  }
  .frame.lit img{filter:brightness(.62) saturate(.7) contrast(1.05)}
  .frame.lit.bw img{filter:brightness(.62) saturate(0) contrast(1.1)}
  /* ---------- Pool of light following loupe ---------- */
  .pool{
    position:fixed;z-index:20;pointer-events:none;
    width:760px;height:760px;
    left:0;top:0;margin:-380px 0 0 -380px;
    background:radial-gradient(circle, rgba(255,236,200,.16) 0%, rgba(255,225,180,.07) 30%, transparent 62%);
    mix-blend-mode:screen;
    opacity:0;transition:opacity .5s;
    will-change:transform;
  }
  /* ---------- The loupe ---------- */
  .loupe{
    position:fixed;z-index:50;pointer-events:none;
    width:var(--loupe-size);height:var(--loupe-size);
    left:0;top:0;
    margin:calc(var(--loupe-size)/-2) 0 0 calc(var(--loupe-size)/-2);
    border-radius:50%;
    opacity:0;transition:opacity .45s, width .4s, height .4s, margin .4s;
    will-change:transform;
    box-shadow:
      0 0 0 2px rgba(255,240,210,.5),
      0 0 0 9px rgba(28,22,15,.95),
      0 0 0 11px rgba(120,96,60,.5),
      0 22px 60px rgba(0,0,0,.7),
      inset 0 0 40px rgba(0,0,0,.55);
  }
  .loupe .lens{
    position:absolute;inset:0;border-radius:50%;overflow:hidden;
    background-repeat:no-repeat;
    /* bright, full colour magnified view */
    filter:brightness(1.18) saturate(1.18) contrast(1.06);
  }
  /* glass highlights + chromatic edge */
  .loupe .glass{
    position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:
      radial-gradient(60% 50% at 32% 26%, rgba(255,255,255,.22), transparent 60%),
      radial-gradient(120% 120% at 50% 50%, transparent 60%, rgba(120,180,255,.10) 80%, rgba(255,120,90,.12) 92%, transparent 100%);
    box-shadow:inset 0 0 30px rgba(0,0,0,.5), inset 0 0 4px rgba(255,255,255,.25);
  }
  .loupe .crosshair{
    position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:
      linear-gradient(transparent 49.6%, rgba(232,183,101,.18) 49.6%, rgba(232,183,101,.18) 50.4%, transparent 50.4%),
      linear-gradient(90deg, transparent 49.6%, rgba(232,183,101,.18) 49.6%, rgba(232,183,101,.18) 50.4%, transparent 50.4%);
  }
  /* metadata readout inside loupe */
  .loupe .read{
    position:absolute;left:50%;bottom:14%;transform:translateX(-50%);
    text-align:center;width:84%;z-index:3;
    text-shadow:0 1px 6px rgba(0,0,0,.9);
    opacity:0;transition:opacity .25s;
  }
  .loupe.has-data .read{opacity:1}
  .loupe .read .t{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:17px;color:#fff8ec;line-height:1.05;
  }
  .loupe .read .m{
    font-family:'JetBrains Mono',monospace;
    font-size:8.5px;letter-spacing:.08em;color:var(--amber);
    margin-top:5px;text-transform:uppercase;
  }
  /* ---------- Picked-up frame (locked center) ---------- */
  .stage{
    position:fixed;inset:0;z-index:70;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;
    background:rgba(5,4,3,0);
    pointer-events:none;
    opacity:0;transition:opacity .5s, background .5s;
  }
  .stage.on{opacity:1;background:rgba(5,4,3,.86);pointer-events:auto;cursor:none}
  .stage .plate{
    max-width:min(86vw,900px);max-height:64vh;
    border:10px solid #16120c;
    box-shadow:0 40px 120px rgba(0,0,0,.8), 0 0 0 1px rgba(232,183,101,.18), 0 0 90px rgba(255,210,150,.12);
    transform:scale(.7);transition:transform .55s cubic-bezier(.16,1,.3,1);
    background:#000;
  }
  .stage.on .plate{transform:scale(1)}
  .stage .plate img{display:block;max-width:100%;max-height:64vh;object-fit:contain}
  .stage .plate img.bw{filter:saturate(0) contrast(1.08)}
  .cap{
    margin-top:26px;text-align:center;max-width:560px;padding:0 24px;
    transform:translateY(14px);opacity:0;transition:all .55s .15s cubic-bezier(.16,1,.3,1);
  }
  .stage.on .cap{transform:none;opacity:1}
  .cap h2{
    font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;
    font-size:30px;color:#fdf4e2;letter-spacing:.01em;
  }
  .cap .loc{
    font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--warm);
    margin-top:7px;letter-spacing:.04em;
  }
  .cap .specs{
    display:flex;gap:18px;justify-content:center;flex-wrap:wrap;
    margin-top:16px;
    font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--dim);
  }
  .cap .specs b{color:var(--amber);font-weight:500}
  .cap .drop{
    margin-top:22px;font-family:'JetBrains Mono',monospace;font-size:9.5px;
    letter-spacing:.2em;text-transform:uppercase;color:var(--dim);
  }
  /* ---------- Hint ---------- */
  .hint{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
    z-index:62;text-align:center;pointer-events:none;
    font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--dim);
    transition:opacity .6s;
    animation:pulse 3.4s ease-in-out infinite;
  }
  .hint b{color:var(--amber);font-weight:500}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  .hint.gone{opacity:0}

  @media (max-width:760px){
    :root{--loupe-size:210px}
    .sheet{--cols:3;gap:7px;padding:12px}
    .brand h1{font-size:17px}
    .cap h2{font-size:23px}
    body{cursor:auto}
  }
  @media (max-width:420px){
    .sheet{--cols:2}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition-duration:.01ms!important}
  }
</style>
</head>
<body>
  <div class="room"></div>
  <div class="sheet-wrap">
    <div class="sheet" id="sheet"></div>
  </div>
  <div class="pool" id="pool"></div>

  <div class="loupe" id="loupe">
    <div class="lens" id="lens"></div>
    <div class="crosshair"></div>
    <div class="glass"></div>
    <div class="read" id="read">
      <div class="t" id="rt"></div>
      <div class="m" id="rm"></div>
    </div>
  </div>

  <div class="vignette"></div>

  <div class="topbar">
    <a class="backlink" href="../../index.html">&larr; All designs</a>
    <div class="brand meta">
      <h1>TOM&nbsp;MILTON</h1>
      <div class="sub">The Loupe &middot; Light Table</div>
    </div>
  </div>

  <div class="hint" id="hint">Move the <b>loupe</b> &middot; click a frame to lift it</div>

  <div class="stage" id="stage">
    <div class="plate" id="plate"></div>
    <div class="cap" id="cap"></div>
  </div>

<script>
(function(){
  "use strict";
  var BASE = "../../assets/img/";
  var PHOTOS = [
    {f:"golden-field-sunburst.jpg",t:"Last Light, Wheat Country",loc:"Tuscany, Italy",film:"Kodak Portra 400",cam:"Leica M6",yr:"1998"},
    {f:"landscape-misty-mountains.jpg",t:"Morning Fog, Cascades",loc:"Washington, USA",film:"Fujifilm Pro 400H",cam:"Pentax 67",yr:"2001"},
    {f:"lake-cabin-dawn.jpg",t:"The Cabin at Dawn",loc:"Banff, Canada",film:"Kodak Ektar 100",cam:"Mamiya 7 II",yr:"2003"},
    {f:"forest-sunlight.jpg",t:"Cathedral of Pines",loc:"Olympic NP, USA",film:"Kodak Portra 160",cam:"Hasselblad 500CM",yr:"1996"},
    {f:"valley-green-river.jpg",t:"River Bend, Spring",loc:"Glencoe, Scotland",film:"Fujifilm Velvia 50",cam:"Nikon F3",yr:"1999"},
    {f:"cliff-coast-ocean.jpg",t:"Edge of the World",loc:"Big Sur, USA",film:"Kodak Portra 400",cam:"Contax G2",yr:"2002"},
    {f:"mountain-road-fog.jpg",t:"The Long Way Home",loc:"Dolomites, Italy",film:"Cinestill 800T",cam:"Canon AE-1",yr:"2005"},
    {f:"sun-through-leaves.jpg",t:"Backlit",loc:"Kyoto, Japan",film:"Kodak Portra 800",cam:"Leica M6",yr:"2004"},
    {f:"lake-mountain-house.jpg",t:"Reflections, Still Morning",loc:"Hallstatt, Austria",film:"Kodak Ektar 100",cam:"Mamiya RZ67",yr:"2000"},
    {f:"forest-path-trees.jpg",t:"Into the Woods",loc:"Black Forest, Germany",film:"Kodak Portra 160",cam:"Rolleiflex 2.8F",yr:"1995"},
    {f:"waterfall-bridge.jpg",t:"Hidden Falls",loc:"Iceland",film:"Fujifilm Velvia 50",cam:"Nikon FM2",yr:"2006"},
    {f:"desert-dunes.jpg",t:"Wind Lines",loc:"Namibia",film:"Kodak Ektar 100",cam:"Hasselblad 503CW",yr:"2008"},
    {f:"misty-pine-forest.jpg",t:"Silence",loc:"Norway",film:"Ilford HP5 Plus",cam:"Leica M6",yr:"2003",bw:true},
    {f:"man-portrait-street.jpg",t:"Stranger, No. 14",loc:"Havana, Cuba",film:"Kodak Tri-X 400",cam:"Leica M4",yr:"2012",bw:true},
    {f:"woman-portrait-window.jpg",t:"By the Window",loc:"Lisbon, Portugal",film:"Kodak Portra 400",cam:"Pentax 67",yr:"2011"},
    {f:"friends-golden-hour.jpg",t:"Golden Hour, Together",loc:"California, USA",film:"Kodak Portra 400",cam:"Nikon F100",yr:"2016"},
    {f:"woman-curly-portrait.jpg",t:"Curls",loc:"Brooklyn, USA",film:"Cinestill 800T",cam:"Canon AE-1",yr:"2017"},
    {f:"street-cafe-paris.jpg",t:"Café de Flore",loc:"Paris, France",film:"Kodak Gold 200",cam:"Olympus OM-1",yr:"2020"},
    {f:"vintage-car-street.jpg",t:"Sunday Drive",loc:"Havana, Cuba",film:"Kodak Ektar 100",cam:"Nikon FE",yr:"2022"},
    {f:"cozy-interior-window.jpg",t:"Home Light",loc:"Copenhagen, Denmark",film:"Kodak Portra 400",cam:"Leica M6",yr:"2023"}
  ];

  var sheet = document.getElementById('sheet');
  var loupe = document.getElementById('loupe');
  var lens  = document.getElementById('lens');
  var pool  = document.getElementById('pool');
  var read  = document.getElementById('read');
  var rt    = document.getElementById('rt');
  var rm    = document.getElementById('rm');
  var hint  = document.getElementById('hint');
  var stage = document.getElementById('stage');
  var plate = document.getElementById('plate');
  var cap   = document.getElementById('cap');

  var reduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  // Build contact sheet
  PHOTOS.forEach(function(p,i){
    var fr = document.createElement('div');
    fr.className = 'frame' + (p.bw ? ' bw' : '');
    fr.dataset.idx = i;
    var n = (i+1) < 10 ? '0'+(i+1) : ''+(i+1);
    var img = document.createElement('img');
    img.src = BASE + p.f;
    img.alt = p.t + ' — ' + p.loc + ', ' + p.yr;
    img.loading = 'lazy';
    img.draggable = false;
    var idx = document.createElement('span');
    idx.className = 'idx';
    idx.textContent = n;
    fr.appendChild(img);
    fr.appendChild(idx);
    sheet.appendChild(fr);
  });

  // --- Loupe magnification ---
  // The loupe shows a magnified slice of the frame currently under it.
  var ZOOM = 2.4;
  var curImg = null;     // <img> element currently under loupe
  var curData = null;

  function setLensImage(img, data){
    if(curImg === img) return;
    curImg = img; curData = data;
    if(!img){
      lens.style.backgroundImage = 'none';
      loupe.classList.remove('has-data');
      return;
    }
    lens.style.backgroundImage = 'url("'+img.src+'")';
    lens.style.filter = data && data.bw
      ? 'brightness(1.12) saturate(0) contrast(1.12)'
      : 'brightness(1.18) saturate(1.18) contrast(1.06)';
    rt.textContent = data.t;
    rm.textContent = data.film + '  ·  ' + data.yr;
    loupe.classList.add('has-data');
  }

  function updateLens(px, py){
    if(!curImg) return;
    var r = curImg.getBoundingClientRect();
    var bw = r.width * ZOOM;
    var bh = r.height * ZOOM;
    lens.style.backgroundSize = bw + 'px ' + bh + 'px';
    // position of pointer within image (0..1)
    var fx = (px - r.left) / r.width;
    var fy = (py - r.top) / r.height;
    var L = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--loupe-size'));
    var bgx = -(fx * bw) + L/2;
    var bgy = -(fy * bh) + L/2;
    lens.style.backgroundPosition = bgx + 'px ' + bgy + 'px';
  }

  // --- Pointer tracking with rAF lerp ---
  var tx = window.innerWidth/2, ty = window.innerHeight/2; // target
  var lx = tx, ly = ty;                                    // lerped
  var active = false;
  var rafId = null;

  function lit(on){
    loupe.style.opacity = on ? 1 : 0;
    pool.style.opacity  = on ? 1 : 0;
  }

  function frameAt(x,y){
    var el = document.elementFromPoint(x,y);
    if(!el) return null;
    var fr = el.closest ? el.closest('.frame') : null;
    return fr;
  }

  var litFrame = null;
  function loop(){
    var f = reduced ? 1 : 0.22;
    lx += (tx - lx) * f;
    ly += (ty - ly) * f;
    var L = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--loupe-size'));
    loupe.style.transform = 'translate('+lx+'px,'+ly+'px)';
    pool.style.transform  = 'translate('+lx+'px,'+ly+'px)';

    if(active){
      var fr = frameAt(lx, ly);
      if(fr){
        var i = +fr.dataset.idx;
        var img = fr.querySelector('img');
        setLensImage(img, PHOTOS[i]);
        if(litFrame !== fr){
          if(litFrame) litFrame.classList.remove('lit');
          fr.classList.add('lit');
          litFrame = fr;
        }
        updateLens(lx, ly);
      } else {
        setLensImage(null,null);
        if(litFrame){ litFrame.classList.remove('lit'); litFrame = null; }
      }
    }
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);

  function move(x,y){ tx = x; ty = y; }

  // Pointer events (covers mouse + touch + pen)
  window.addEventListener('pointermove', function(e){
    if(stage.classList.contains('on')) return;
    if(!active){ active = true; lit(true); }
    move(e.clientX, e.clientY);
    dismissHint();
  }, {passive:true});

  window.addEventListener('pointerdown', function(e){
    if(stage.classList.contains('on')) return;
    if(!active){ active = true; lit(true); }
    move(e.clientX, e.clientY);
    // snap closer on touch so the loupe is right under the finger quickly
    if(e.pointerType === 'touch'){ lx = e.clientX; ly = e.clientY; }
    dismissHint();
  }, {passive:true});

  // leaving the window hides the loupe (desktop)
  window.addEventListener('pointerleave', function(){
    if(!stage.classList.contains('on')){ active=false; lit(false);
      if(litFrame){litFrame.classList.remove('lit');litFrame=null;}
    }
  });

  // --- Click a frame to lift it to the stage ---
  sheet.addEventListener('click', function(e){
    var fr = e.target.closest('.frame');
    if(!fr) return;
    var i = +fr.dataset.idx;
    openStage(PHOTOS[i]);
  });

  function openStage(p){
    plate.innerHTML = '';
    var img = document.createElement('img');
    img.src = BASE + p.f;
    img.alt = p.t + ' — ' + p.loc;
    if(p.bw) img.className = 'bw';
    img.draggable = false;
    plate.appendChild(img);
    cap.innerHTML =
      '<h2>'+p.t+'</h2>'+
      '<div class="loc">'+p.loc+' &middot; '+p.yr+'</div>'+
      '<div class="specs"><span>Film&nbsp;<b>'+p.film+'</b></span>'+
      '<span>Camera&nbsp;<b>'+p.cam+'</b></span></div>'+
      '<div class="drop">Click anywhere to set it back</div>';
    stage.classList.add('on');
    lit(false);
    active = false;
    if(litFrame){ litFrame.classList.remove('lit'); litFrame=null; }
  }

  stage.addEventListener('click', function(){
    stage.classList.remove('on');
  });

  // --- Hint dismissal ---
  var hintGone = false;
  function dismissHint(){
    if(hintGone) return;
    hintGone = true;
    setTimeout(function(){ hint.classList.add('gone'); }, 2600);
  }

  // keep loupe parked over a frame at load for a strong initial screenshot
  window.addEventListener('load', function(){
    // park over frame index 0 (top-left-ish) — use first frame center
    var first = sheet.children[7] || sheet.children[0];
    if(first){
      var r = first.getBoundingClientRect();
      tx = lx = r.left + r.width/2;
      ty = ly = r.top + r.height/2;
      active = true; lit(true);
      var img = first.querySelector('img');
      var idx = +first.dataset.idx;
      setLensImage(img, PHOTOS[idx]);
      first.classList.add('lit'); litFrame = first;
      updateLens(lx, ly);
    }
  });

  // recompute lens on resize/scroll so magnification stays aligned
  window.addEventListener('resize', function(){ if(active) updateLens(lx,ly); });

  // Esc closes stage
  window.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && stage.classList.contains('on')) stage.classList.remove('on');
  });
})();
</script>
</body>
</html>
